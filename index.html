<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ipzonex Widget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --obsidian:#0E1A2B;
    --obsidian-2:#1A2B42;
    --obsidian-3:#24395A;
    --obsidian-4:#324B73;
    --ink:#EAF1FB;
    --ink-soft:#9FB3CE;
    --accent:#5EE6C9;
    --accent-deep:#2FBFA1;
    --violet:#7C6FEF;
    --violet-deep:#5847D6;
    --white:#FFFFFF;
    --line:rgba(255,255,255,0.10);
  }
  *{box-sizing:border-box;}
  html,body{
    height:100%;
    margin:0;
    background:transparent;
    font-family:'Inter',sans-serif;
    color:var(--ink);
    overflow:hidden;
  }

  /* ---------- Launcher bubble ---------- */
  .launcher{
    position:fixed;
    bottom:0; right:0;
    width:64px; height:64px;
    border-radius:50%;
    background:#1A2B42;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    border:none;
    box-shadow:0 10px 24px -8px rgba(0,0,0,0.55);
    transition:transform .18s ease, opacity .18s ease;
  }
  .launcher:hover{ transform:scale(1.06); }
  .launcher svg{ width:26px; height:26px; }
  body.open .launcher{ opacity:0; pointer-events:none; transform:scale(0.6); }

  /* ---------- Panel ---------- */
  .panel{
    position:fixed;
    bottom:0; right:0;
    width:100%; height:100%;
    background:var(--obsidian-2);
    border-radius:18px;
    border:1px solid var(--line);
    box-shadow:0 24px 60px -20px rgba(0,0,0,0.65);
    display:flex;
    flex-direction:column;
    opacity:0;
    transform:translateY(12px) scale(0.98);
    pointer-events:none;
    transition:opacity .16s ease, transform .16s ease;
  }
  body.open .panel{
    opacity:1;
    transform:translateY(0) scale(1);
    pointer-events:auto;
  }

  /* header */
  .header{
    display:flex; align-items:center; gap:10px;
    padding:14px 14px;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .avatar{
    width:34px; height:34px;
    border-radius:10px;
    background:var(--accent-deep);
    display:flex; align-items:center; justify-content:center;
    position:relative;
    flex-shrink:0;
  }
  .avatar svg{ width:20px; height:20px; }
  .who{ flex:1; min-width:0; }
  .who .name{ font-family:'Sora',sans-serif; font-weight:700; font-size:14px; display:flex; align-items:center; gap:6px; }
  .who .name .dot{ width:7px; height:7px; border-radius:50%; background:#3CCB6B; box-shadow:0 0 0 3px rgba(60,203,107,0.2); }
  .who .status{ font-size:11px; color:var(--ink-soft); }
  .close-btn{
    width:28px; height:28px;
    border-radius:50%;
    border:none;
    background:var(--obsidian-3);
    color:var(--ink-soft);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    font-size:14px;
    flex-shrink:0;
  }
  .close-btn:hover{ color:var(--accent); }

  /* messages */
  .messages{
    flex:1;
    overflow-y:auto;
    padding:14px 12px 8px;
    background:var(--obsidian);
  }
  .messages::-webkit-scrollbar{ width:5px; }
  .messages::-webkit-scrollbar-thumb{ background:var(--obsidian-4); border-radius:6px; }

  .row{ display:flex; margin-bottom:10px; }
  .row.bot{ justify-content:flex-start; }
  .row.user{ justify-content:flex-end; }
  .bubble{
    max-width:82%;
    padding:9px 12px;
    border-radius:14px;
    font-size:13.5px;
    line-height:1.5;
  }
  .row.bot .bubble{ background:var(--obsidian-3); border:1px solid var(--line); border-bottom-left-radius:4px; }
  .row.user .bubble{ background:linear-gradient(135deg, var(--violet), var(--violet-deep)); color:var(--white); border-bottom-right-radius:4px; }
  .bubble p{ margin:0 0 6px; }
  .bubble p:last-child{ margin-bottom:0; }
  .bubble strong{ font-weight:700; color:var(--accent); }
  .row.user .bubble strong{ color:var(--white); }
  .bubble code{ background:var(--obsidian-4); padding:1px 5px; border-radius:5px; font-family:monospace; font-size:12px; }
  .bubble pre{ background:var(--obsidian-4); padding:8px 10px; border-radius:10px; overflow-x:auto; margin:6px 0; }
  .bubble pre code{ background:none; padding:0; }
  .bubble time,.bubble .time{ display:block; margin-top:4px; font-size:10px; opacity:0.6; text-align:right; }

  .typing-row{ display:none; }
  .typing-row.show{ display:flex; }
  .typing-bubble{ background:var(--obsidian-3); border:1px solid var(--line); border-radius:14px; border-bottom-left-radius:4px; padding:9px 13px; display:flex; gap:4px; }
  .typing-bubble span{ width:6px; height:6px; border-radius:50%; background:var(--accent); animation:bounce 1.2s infinite ease-in-out; }
  .typing-bubble span:nth-child(2){ animation-delay:.15s; }
  .typing-bubble span:nth-child(3){ animation-delay:.3s; }
  @keyframes bounce{ 0%,60%,100%{ transform:translateY(0); opacity:.5; } 30%{ transform:translateY(-4px); opacity:1; } }

  /* chips */
  .suggestions{ display:flex; gap:6px; padding:8px 12px; border-top:1px solid var(--line); overflow-x:auto; flex-shrink:0; }
  .suggestions::-webkit-scrollbar{ display:none; }
  .chip{ flex-shrink:0; border:1px solid var(--line); background:var(--obsidian-3); color:var(--ink-soft); font-size:11.5px; font-weight:600; padding:6px 11px; border-radius:999px; cursor:pointer; white-space:nowrap; }
  .chip:hover{ border-color:var(--accent); color:var(--accent); }

  /* input */
  .input-area{ padding:10px 12px 12px; flex-shrink:0; }
  .input-row{ display:flex; align-items:center; gap:8px; background:var(--obsidian-3); border:1px solid var(--line); border-radius:999px; padding:5px 5px 5px 14px; }
  .input-row input{ flex:1; border:none; background:transparent; outline:none; font-size:13.5px; color:var(--ink); font-family:'Inter',sans-serif; }
  .input-row input::placeholder{ color:var(--ink-soft); }
  .send-btn{ width:32px; height:32px; border-radius:50%; border:none; background:linear-gradient(135deg, var(--accent), var(--accent-deep)); color:#06251E; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .send-btn:active{ transform:scale(0.9); }
</style>
</head>
<body>

  <button class="launcher" id="launcher" onclick="openWidget()" title="Buka chat">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 4H20V16H8L4 20V4Z" stroke="#FFFFFF" stroke-width="1.8" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="panel" id="panel">
    <div class="header">
      <div class="avatar">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3C7.5 3 4 6.1 4 10c0 2.4 1.3 4.5 3.3 5.8-.2.8-.7 1.9-1.3 2.7 1.7-.2 3.3-.8 4.5-1.6 1 .2 2 .3 3.5.3 4.5 0 8-3.1 8-7s-3.5-7-8-7Z" fill="#06251E"/>
          <circle cx="9" cy="9.5" r="1.2" fill="var(--accent-deep)"/>
          <circle cx="15" cy="9.5" r="1.2" fill="var(--accent-deep)"/>
        </svg>
      </div>
      <div class="who">
        <div class="name">ipzonex <span class="dot"></span></div>
        <div class="status">Aktif sekarang</div>
      </div>
      <button class="close-btn" onclick="downloadLaporan()" title="Download laporan (.doc)">⬇</button>
      <button class="close-btn" onclick="resetChat()" title="Mulai chat baru">⟲</button>
      <button class="close-btn" onclick="closeWidget()" title="Tutup">✕</button>
    </div>

    <div class="messages" id="messages">
      <div class="row bot">
        <div class="bubble">
          Halo! Aku ipzonex. Ada yang bisa dibantu?
          <span class="time" id="haloTime"></span>
        </div>
      </div>
      <div class="row typing-row" id="typingRow">
        <div class="typing-bubble"><span></span><span></span><span></span></div>
      </div>
    </div>

    <div class="suggestions">
      <button class="chip" onclick="kirimSaran(this)">Ringkas teks ini</button>
      <button class="chip" onclick="kirimSaran(this)">Buatkan rencana kedepannya</button>
      <button class="chip" onclick="kirimSaran(this)">Jelaskan konsep ini</button>
      <button class="chip" onclick="kirimSaran(this)">Berikan laporan magang kemaren</button>
    </div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="userInput" placeholder="Tulis pesan untuk Ipzonex" onkeydown="if(event.key==='Enter')kirimPesan()">
        <button class="send-btn" onclick="kirimPesan()" title="Kirim">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M4 20L20 12L4 4V10L15 12L4 14V20Z" fill="#06251E"/></svg>
        </button>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  // ---------- Komunikasi dengan halaman induk (postMessage) ----------
  function notifyParent(open){
    window.parent.postMessage({ source: "ipzonex-widget", type: "toggle", open: open }, "*");
  }

  // Waktu otomatis WIB untuk pesan pembuka
  (function setHaloTime(){
    const now = new Date();
    const wib = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (7 * 3600000));
    const jam = wib.getHours().toString().padStart(2,"0");
    const menit = wib.getMinutes().toString().padStart(2,"0");
    const el = document.getElementById("haloTime");
    if(el) el.textContent = jam + ":" + menit;
  })();

  function openWidget(){
    document.body.classList.add("open");
    notifyParent(true);
    setTimeout(() => document.getElementById("userInput").focus(), 200);
  }
  function closeWidget(){
    document.body.classList.remove("open");
    notifyParent(false);
  }

  // ---------- Chat logic ----------
  function renderText(raw){
    if(typeof marked !== "undefined"){ return marked.parse(raw || ""); }
    return (raw || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
  function scrollToBottom(){
    const box = document.getElementById("messages");
    box.scrollTop = box.scrollHeight;
  }
  function addMessage(role, text, time){
    const box = document.getElementById("messages");
    const typingRow = document.getElementById("typingRow");
    const row = document.createElement("div");
    row.className = "row " + (role === "user" ? "user" : "bot");
    row.innerHTML = `<div class="bubble">${renderText(text)}<span class="time">${time}</span></div>`;
    box.insertBefore(row, typingRow);
    scrollToBottom();
  }
  function setTyping(show){
    document.getElementById("typingRow").classList.toggle("show", show);
    scrollToBottom();
  }
  function nowTime(){
    const d = new Date();
    return d.getHours().toString().padStart(2,"0") + ":" + d.getMinutes().toString().padStart(2,"0");
  }
  // Base URL API otomatis mengikuti host halaman (port 8080 di server)
  const API = window.location.origin;

  function kirimSaran(btn){
    document.getElementById("userInput").value = btn.textContent;
    kirimPesan();
  }
  function downloadLaporan(){
    const link = document.createElement("a");
    link.href = API + "/download-laporan";
    link.download = "laporan_magang.doc";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }
  async function resetChat(){
    try{
      await fetch(API + "/reset-chat", { method: "POST" });
    }catch(e){}
    window.riwayat = [];
  }
  async function kirimPesan(){
    const inputField = document.getElementById("userInput");
    const text = inputField.value.trim();
    if(!text) return;

    addMessage("user", text, nowTime());
    inputField.value = "";
    setTyping(true);

    if(!window.riwayat) window.riwayat = [];

    try{
      const response = await fetch(API + "/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pesan_user: text, riwayat: window.riwayat })
      });
      const data = await response.json();
      setTyping(false);
      addMessage("bot", data.jawaban, nowTime());
      // Simpan riwayat dari backend agar konteks terjaga di sesi ini
      if(Array.isArray(data.riwayat)){ window.riwayat = data.riwayat; }
      else { window.riwayat.push({role:"user", content:text}); window.riwayat.push({role:"assistant", content:data.jawaban}); }
    } catch(error){
      setTyping(false);
      addMessage("bot", "<span style='color:#FF6B6B;'>Gagal terhubung ke backend.</span>", nowTime());
    }
  }
</script>
</body>
</html>
